name: Refresh Dashboard from Smartsheet

on:
  schedule:
    # Runs every weekday at 9 AM Pacific Time (17:00 UTC)
    - cron: '0 17 * * 1-5'
  workflow_dispatch:  # Also allows manual trigger from GitHub Actions UI

permissions:
  contents: write  # Needed to commit the regenerated index.html back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate dashboard HTML
        env:
          SMARTSHEET_TOKEN: ${{ secrets.SMARTSHEET_TOKEN }}
        run: python generate.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || (
            git commit -m "chore: refresh dashboard from Smartsheet [skip ci]" &&
            git push
          )
